<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>유주의 반짝반짝 용돈기입장</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-pink: #FFB7B2;
            --soft-blue: #B2E2F2;
            --text-dark: #444;
            --bg-grad: linear-gradient(135deg, #FFF9F9 0%, #FDF0F0 100%);
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background: var(--bg-grad);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            color: var(--text-dark);
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(255, 183, 178, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        header { text-align: center; margin-bottom: 25px; }
        header h1 { font-size: 22px; color: #FF8585; margin: 0; }
        header p { font-size: 14px; color: #AAA; margin-top: 5px; }

        .balance-card {
            background: white;
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 20px;
            border: 2px solid var(--main-pink);
            box-shadow: 0 8px 15px rgba(255, 183, 178, 0.1);
        }
        .balance-amount { font-size: 32px; font-weight: 800; color: #FF8585; }

        /* 1단계: 유형 선택 버튼 */
        .type-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        .type-btn {
            flex: 1;
            padding: 18px;
            border-radius: 15px;
            border: 3px solid transparent;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.2s;
            background: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .type-btn.plus { color: #0077A3; border-color: var(--soft-blue); }
        .type-btn.minus { color: #A3002E; border-color: var(--main-pink); }
        .type-btn.active.plus { background: var(--soft-blue); color: #0077A3; }
        .type-btn.active.minus { background: var(--main-pink); color: white; }

        /* 2단계: 입력 섹션 (처음엔 숨김) */
        .input-section {
            display: none;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
            padding: 15px;
            background: #FFF;
            border-radius: 15px;
            border: 1px solid #EEE;
        }
        input, select {
            padding: 14px;
            border: 1px solid #EEE;
            border-radius: 12px;
            font-size: 16px;
            background: #F9F9F9;
            outline: none;
        }

        .submit-btn {
            padding: 15px;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 700;
            background: #FF8585;
            color: white;
            cursor: pointer;
        }

        /* 리스트 내역 및 삭제 버튼 */
        .history-item {
            background: white;
            padding: 15px;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .item-info { flex: 1; }
        .item-name { font-size: 16px; font-weight: 600; display: block; }
        .item-date { font-size: 12px; color: #BBB; }
        .item-amount-group { text-align: right; display: flex; align-items: center; gap: 10px; }
        .delete-btn {
            background: #FEE;
            color: #FF8585;
            border: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            font-size: 12px;
            cursor: pointer;
            font-weight: bold;
        }
        .plus-text { color: #2D9CDB; font-weight: 700; }
        .minus-text { color: #EB5757; font-weight: 700; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>💖 유주의 용돈기입장</h1>
        <p id="today-date"></p>
    </header>

    <div class="balance-card">
        <div class="balance-amount" id="total-balance">0원</div>
    </div>

    <div class="type-selector">
        <button class="type-btn plus" id="btn-in" onclick="selectType('in')">
            <span>💰</span> 돈 받았다!
        </button>
        <button class="type-btn minus" id="btn-out" onclick="selectType('out')">
            <span>💸</span> 돈 썼다!
        </button>
    </div>

    <div class="input-section" id="input-area">
        <select id="category"></select>
        <input type="text" id="desc" placeholder="어디에 썼나요?">
        <input type="number" id="amount" placeholder="얼마인가요?">
        <button class="submit-btn" onclick="addRecord()">기록하기 ✨</button>
    </div>

    <div style="font-weight: 700; margin-bottom: 15px;">최근 기록</div>
    <div id="history-list"></div>
</div>

<script>
    let currentType = '';
    let records = JSON.parse(localStorage.getItem('yuju_money_v2')) || [];

    const categories = {
        in: [['💪', '심부름/용돈'], ['🎁', '선물 받았어요'], ['✨', '기타']],
        out: [['🍭', '간식'], ['🎁', '장난감'], ['📚', '문구/책'], ['✨', '기타']]
    };

    window.onload = () => {
        const d = new Date();
        document.getElementById('today-date').innerText = `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일`;
        render();
    };

    function selectType(type) {
        currentType = type;
        document.getElementById('input-area').style.display = 'flex';
        
        // 버튼 활성화 표시
        document.getElementById('btn-in').classList.toggle('active', type === 'in');
        document.getElementById('btn-out').classList.toggle('active', type === 'out');

        // 카테고리 업데이트
        const catSelect = document.getElementById('category');
        catSelect.innerHTML = categories[type].map(c => `<option value="${c[0]}">${c[0]} ${c[1]}</option>`).join('');
        
        // 입력창 포커스
        document.getElementById('desc').placeholder = type === 'in' ? "왜 받았나요?" : "어디에 썼나요?";
    }

    function addRecord() {
        const cat = document.getElementById('category').value;
        const desc = document.getElementById('desc').value;
        const amt = parseInt(document.getElementById('amount').value);

        if (!desc || isNaN(amt)) return alert("내용을 다 적어주세요!");

        records.unshift({
            id: Date.now(),
            type: currentType,
            cat, desc, amt,
            date: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
        });

        localStorage.setItem('yuju_money_v2', JSON.stringify(records));
        resetInput();
        render();
    }

    function resetInput() {
        document.getElementById('input-area').style.display = 'none';
        document.getElementById('btn-in').classList.remove('active');
        document.getElementById('btn-out').classList.remove('active');
        document.getElementById('desc').value = '';
        document.getElementById('amount').value = '';
    }

    function deleteRecord(id) {
        if(confirm("이 기록을 지울까요?")) {
            records = records.filter(r => r.id !== id);
            localStorage.setItem('yuju_money_v2', JSON.stringify(records));
            render();
        }
    }

    function render() {
        const list = document.getElementById('history-list');
        list.innerHTML = '';
        let balance = 0;

        records.forEach(r => {
            balance += (r.type === 'in' ? r.amt : -r.amt);
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `
                <div class="item-info">
                    <span class="item-name">${r.cat} ${r.desc}</span>
                    <span class="item-date">${r.date}</span>
                </div>
                <div class="item-amount-group">
                    <span class="${r.type === 'in' ? 'plus-text' : 'minus-text'}">
                        ${r.type === 'in' ? '+' : '-'}${r.amt.toLocaleString()}원
                    </span>
                    <button class="delete-btn" onclick="deleteRecord(${r.id})">✕</button>
                </div>
            `;
            list.appendChild(div);
        });

        document.getElementById('total-balance').innerText = `${balance.toLocaleString()}원`;
    }
</script>
</body>
</html>
