<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>유주의 반짝반짝 용돈기입장</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-pink: #FFB7B2;
            --soft-blue: #B2E2F2;
            --text-dark: #444;
            --bg-grad: linear-gradient(135deg, #FFF9F9 0%, #FDF0F0 100%);
        }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg-grad); margin: 0; padding: 20px 20px 80px 20px; display: flex; justify-content: center; color: var(--text-dark); }
        .app-container { width: 100%; max-width: 450px; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 30px; padding: 24px; min-height: 80vh; }
        
        /* 탭 스타일 */
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* 헤더 & 잔액 */
        header { text-align: center; margin-bottom: 20px; }
        .balance-card { background: white; padding: 20px; border-radius: 20px; text-align: center; margin-bottom: 20px; border: 2px solid var(--main-pink); }
        .balance-amount { font-size: 28px; font-weight: 800; color: #FF8585; }

        /* 입력 폼 */
        .type-selector { display: flex; gap: 10px; margin-bottom: 15px; }
        .type-btn { flex: 1; padding: 15px; border-radius: 12px; border: 2px solid #EEE; background: white; cursor: pointer; font-weight: 700; }
        .type-btn.active.plus { background: var(--soft-blue); border-color: var(--soft-blue); }
        .type-btn.active.minus { background: var(--main-pink); border-color: var(--main-pink); color: white; }
        
        .input-group { display: flex; flex-direction: column; gap: 10px; background: #FFF; padding: 15px; border-radius: 15px; margin-bottom: 20px; }
        input, select { padding: 12px; border: 1px solid #EEE; border-radius: 10px; font-size: 15px; }
        .submit-btn { padding: 15px; border: none; border-radius: 12px; background: #FF8585; color: white; font-weight: 700; cursor: pointer; }

        /* 내역 아이템 */
        .history-item { background: white; padding: 15px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; border-left: 4px solid #EEE; }
        .item-date { font-size: 11px; color: #999; margin-bottom: 3px; }
        .item-name { font-weight: 600; font-size: 15px; }
        .item-amount { font-weight: 700; }
        .plus { border-left-color: var(--soft-blue); color: #2D9CDB; }
        .minus { border-left-color: var(--main-pink); color: #EB5757; }
        .del-btn { background: none; border: none; color: #CCC; margin-left: 10px; cursor: pointer; }

        /* 통계 디자인 */
        .stat-card { background: white; padding: 20px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .stat-title { font-size: 14px; color: #888; margin-bottom: 10px; }
        .stat-val { font-size: 20px; font-weight: 700; color: #444; }

        /* 하단 탭 바 */
        .nav-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: white; display: flex; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 10px; }
        .nav-item { flex: 1; text-align: center; padding: 10px; color: #AAA; cursor: pointer; font-weight: 600; font-size: 14px; }
        .nav-item.active { color: #FF8585; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="tab-record" class="tab-content active">
        <header><h1>💰 유주의 기입장</h1></header>
        <div class="balance-card">
            <div style="font-size: 14px; color: #888;">지금 있는 돈</div>
            <div class="balance-amount" id="total-balance">0원</div>
        </div>

        <div class="type-selector">
            <button class="type-btn" id="t-in" onclick="setType('in')">받았다 💰</button>
            <button class="type-btn" id="t-out" onclick="setType('out')">썼다 💸</button>
        </div>

        <div class="input-group">
            <input type="date" id="date-input">
            <select id="category"></select>
            <input type="text" id="desc" placeholder="내용 적기">
            <input type="number" id="amount" placeholder="얼마인가요?">
            <button class="submit-btn" onclick="addRecord()">기록하기</button>
        </div>

        <div id="history-list"></div>
    </div>

    <div id="tab-stat" class="tab-content">
        <header><h1>📊 소비 리포트</h1></header>
        <div class="stat-card">
            <div class="stat-title">📅 이번 주에 쓴 돈</div>
            <div class="stat-val" id="week-out">0원</div>
        </div>
        <div class="stat-card">
            <div class="stat-title">🗓️ 이번 달에 쓴 돈</div>
            <div class="stat-val" id="month-out">0원</div>
        </div>
        <div class="stat-card">
            <div class="stat-title">⭐ 이번 달 가장 많이 쓴 곳</div>
            <div class="stat-val" id="top-cat">-</div>
        </div>
    </div>
</div>

<div class="nav-bar">
    <div class="nav-item active" onclick="showTab('record', this)">📝 기록</div>
    <div class="nav-item" onclick="showTab('stat', this)">📊 통계</div>
</div>

<script>
    let currentType = 'out';
    let records = JSON.parse(localStorage.getItem('yuju_v3')) || [];
    const categories = {
        in: [['💪','심부름/용돈'], ['🎁','선물'], ['✨','기타']],
        out: [['🍭','간식'], ['🎁','장난감'], ['📚','문구/책'], ['🚌','교통비'], ['✨','기타']]
    };

    window.onload = () => {
        document.getElementById('date-input').value = new Date().toISOString().substring(0, 10);
        setType('out');
        render();
    };

    function showTab(tab, el) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById('tab-' + tab).classList.add('active');
        el.classList.add('active');
        if(tab === 'stat') updateStats();
    }

    function setType(type) {
        currentType = type;
        document.getElementById('t-in').className = 'type-btn' + (type==='in' ? ' active plus' : '');
        document.getElementById('t-out').className = 'type-btn' + (type==='out' ? ' active minus' : '');
        const cat = document.getElementById('category');
        cat.innerHTML = categories[type].map(c => `<option value="${c[0]}">${c[0]} ${c[1]}</option>`).join('');
    }

    function addRecord() {
        const date = document.getElementById('date-input').value;
        const desc = document.getElementById('desc').value;
        const amt = parseInt(document.getElementById('amount').value);
        if(!desc || isNaN(amt)) return alert("내용을 입력해줘!");

        records.unshift({ id: Date.now(), date, type: currentType, cat: document.getElementById('category').value, desc, amt });
        localStorage.setItem('yuju_v3', JSON.stringify(records));
        document.getElementById('desc').value = '';
        document.getElementById('amount').value = '';
        render();
    }

    function deleteRecord(id) {
        if(confirm("지울까?")) {
            records = records.filter(r => r.id !== id);
            localStorage.setItem('yuju_v3', JSON.stringify(records));
            render();
        }
    }

    function render() {
        const list = document.getElementById('history-list');
        list.innerHTML = '';
        let balance = 0;
        
        // 날짜순 정렬
        records.sort((a,b) => new Date(b.date) - new Date(a.date));

        records.forEach(r => {
            balance += (r.type === 'in' ? r.amt : -r.amt);
            const item = document.createElement('div');
            item.className = `history-item ${r.type==='in'?'plus':'minus'}`;
            item.innerHTML = `
                <div>
                    <div class="item-date">${r.date}</div>
                    <div class="item-name">${r.cat} ${r.desc}</div>
                </div>
                <div style="display:flex; align-items:center">
                    <span class="item-amount">${r.type==='in'?'+':'-'}${r.amt.toLocaleString()}</span>
                    <button class="del-btn" onclick="deleteRecord(${r.id})">✕</button>
                </div>
            `;
            list.appendChild(item);
        });
        document.getElementById('total-balance').innerText = balance.toLocaleString() + '원';
    }

    function updateStats() {
        const now = new Date();
        const startOfWeek = new Date(now.setDate(now.getDate() - now.getDay()));
        const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);

        let weekOut = 0, monthOut = 0, catCount = {};

        records.filter(r => r.type === 'out').forEach(r => {
            const rDate = new Date(r.date);
            if(rDate >= startOfWeek) weekOut += r.amt;
            if(rDate >= startOfMonth) {
                monthOut += r.amt;
                catCount[r.cat] = (catCount[r.cat] || 0) + r.amt;
            }
        });

        document.getElementById('week-out').innerText = weekOut.toLocaleString() + '원';
        document.getElementById('month-out').innerText = monthOut.toLocaleString() + '원';
        
        const top = Object.entries(catCount).sort((a,b) => b[1] - a[1])[0];
        document.getElementById('top-cat').innerText = top ? `${top[0]} (${top[1].toLocaleString()}원)` : '-';
    }
</script>
</body>
</html>
