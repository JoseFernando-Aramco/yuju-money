<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>유주의 용돈수첩</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-pink: #FFB7B2;
            --soft-blue: #B2E2F2;
            --text-dark: #444;
            --bg-grad: linear-gradient(135deg, #FFF9F9 0%, #FDF0F0 100%);
        }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg-grad); margin: 0; padding: 20px 20px 80px 20px; display: flex; justify-content: center; color: var(--text-dark); overflow-x: hidden; position: relative; min-height: 100vh; }
        
        /* 📱 메인 앱 컨테이너 */
        .app-container { width: 100%; max-width: 450px; background: rgba(255, 255, 255, 0.92); backdrop-filter: blur(5px); border-radius: 30px; padding: 24px; min-height: 80vh; position: relative; z-index: 10; border: 1px solid rgba(255, 255, 255, 0.6); box-shadow: 0 20px 50px rgba(0,0,0,0.04); }
        
        /* 탭 스타일 */
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* 헤더 & 잔액 */
        header { text-align: center; margin-bottom: 20px; }
        header h1 { font-size: 24px; color: #FF8585; margin: 0; letter-spacing: -1px; }
        .balance-card { background: white; padding: 20px; border-radius: 20px; text-align: center; margin-bottom: 20px; border: 2px solid var(--main-pink); box-shadow: 0 8px 15px rgba(255, 183, 178, 0.1); }
        .balance-amount { font-size: 30px; font-weight: 800; color: #FF8585; margin-top: 5px; }

        /* 입력 폼 */
        .type-selector { display: flex; gap: 10px; margin-bottom: 15px; }
        .type-btn { flex: 1; padding: 15px; border-radius: 12px; border: 2px solid #EEE; background: white; cursor: pointer; font-weight: 700; font-size: 16px; transition: 0.2s; -webkit-tap-highlight-color: transparent; }
        .type-btn.active.plus { background: var(--soft-blue); border-color: var(--soft-blue); color: #0077A3; }
        .type-btn.active.minus { background: var(--main-pink); border-color: var(--main-pink); color: white; }
        
        .input-group { display: flex; flex-direction: column; gap: 10px; background: #FFF; padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #F0F0F0; }
        input, select { padding: 12px; border: 1px solid #EEE; border-radius: 10px; font-size: 15px; outline: none; transition: 0.3s; -webkit-appearance: none; }
        input:focus { border-color: var(--main-pink); background-color: #FFF9F9; }
        .submit-btn { padding: 15px; border: none; border-radius: 12px; background: #FF8585; color: white; font-weight: 700; font-size: 16px; cursor: pointer; transition: 0.1s; -webkit-tap-highlight-color: transparent; }
        .submit-btn:active { transform: scale(0.98); opacity: 0.9; }

        /* 내역 아이템 */
        .history-item { background: white; padding: 15px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; border-left: 5px solid #EEE; box-shadow: 0 2px 5px rgba(0,0,0,0.02); transition: 0.3s; position: relative; z-index: 11; }
        .item-date { font-size: 11px; color: #AAA; margin-bottom: 4px; }
        .item-name { font-weight: 600; font-size: 16px; color: #444; }
        .item-amount { font-weight: 700; font-size: 16px; }
        .plus { border-left-color: var(--soft-blue); }
        .plus .item-amount { color: #2D9CDB; }
        .minus { border-left-color: var(--main-pink); }
        .minus .item-amount { color: #EB5757; }
        .del-btn { background: #F9F9F9; border: none; color: #CCC; margin-left: 12px; width: 24px; height: 24px; border-radius: 50%; cursor: pointer; font-size: 10px; display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; }

        /* 통계 디자인 */
        .stat-card { background: white; padding: 22px; border-radius: 18px; margin-bottom: 15px; border: 1px solid #F0F0F0; position: relative; z-index: 11; }
        .stat-title { font-size: 14px; color: #888; margin-bottom: 10px; }
        .stat-val { font-size: 22px; font-weight: 800; color: #444; }

        /* 하단 탭 바 */
        .nav-bar { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 380px; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); display: flex; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); padding: 8px; border: 1px solid rgba(0,0,0,0.03); z-index: 100; }
        .nav-item { flex: 1; text-align: center; padding: 12px; color: #BBB; cursor: pointer; font-weight: 700; font-size: 15px; transition: 0.3s; -webkit-tap-highlight-color: transparent; }
        .nav-item.active { color: #FF8585; }

        /* 🌸 벚꽃 애니메이션 CSS (업그레이드) */
        .cherry-blossom-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; /* 기입장 위로 올림 */ overflow: hidden; }
        .petal { position: absolute; background-color: #ffb7b2; border-radius: 150% 0 150% 150%; animation: petal-fall linear infinite; transform-style: preserve-3d; }
        
        @keyframes petal-fall {
            0% { top: -10%; transform: translateX(0) rotateY(0deg) rotateZ(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 110%; transform: translateX(180px) rotateY(720deg) rotateZ(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

<div class="cherry-blossom-container" id="petal-container"></div>

<div class="app-container">
    <div id="tab-record" class="tab-content active">
        <header><h1>📖 유주의 용돈수첩</h1></header>
        <div class="balance-card">
            <div style="font-size: 15px; color: #999; font-weight: 600;">지금 내 지갑에는</div>
            <div class="balance-amount" id="total-balance">0원</div>
        </div>

        <div class="type-selector">
            <button class="type-btn" id="t-in" onclick="setType('in')">용돈 받기 💰</button>
            <button class="type-btn" id="t-out" onclick="setType('out')">용돈 쓰기 💸</button>
        </div>

        <div class="input-group" id="input-area">
            <input type="date" id="date-input">
            <select id="category"></select>
            <input type="text" id="desc" placeholder="무엇을 했나요?">
            <input type="number" id="amount" placeholder="얼마인가요?">
            <button class="submit-btn" onclick="addRecord()">수첩에 적기 ✨</button>
        </div>

        <div style="font-weight: 700; margin: 20px 0 10px 5px; color: #666; position: relative; z-index: 11;">기록 목록</div>
        <div id="history-list"></div>
    </div>

    <div id="tab-stat" class="tab-content">
        <header><h1>📊 소비 리포트</h1></header>
        <div class="stat-card">
            <div class="stat-title">📅 이번 주에 쓴 돈</div>
            <div class="stat-val" id="week-out">0원</div>
        </div>
        <div class="stat-card">
            <div class="stat-title">🗓️ 이번 달에 쓴 돈</div>
            <div class="stat-val" id="month-out">0원</div>
        </div>
        <div class="stat-card">
            <div class="stat-title">⭐ 이번 달 최고 지출</div>
            <div class="stat-val" id="top-cat">-</div>
        </div>
    </div>
</div>

<div class="nav-bar">
    <div class="nav-item active" onclick="showTab('record', this)">📝 기록하기</div>
    <div class="nav-item" onclick="showTab('stat', this)">📈 모아보기</div>
</div>

<script>
    let currentType = 'out';
    let records = JSON.parse(localStorage.getItem('yuju_v3')) || [];
    const categories = {
        in: [['💪','심부름/용돈'], ['🎁','선물 받았어요'], ['✨','기타']],
        out: [['🍭','맛있는 간식'], ['🎁','장난감/선물'], ['📚','학용품/책'], ['🚌','버스/지하철'], ['✨','기타']]
    };

    window.onload = () => {
        const today = new Date().toISOString().substring(0, 10);
        document.getElementById('date-input').value = today;
        setType('out');
        render();
        createPetals(); // 🌸 벚꽃 생성
    };

    function showTab(tab, el) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById('tab-' + tab).classList.add('active');
        el.classList.add('active');
        if(tab === 'stat') updateStats();
    }

    function setType(type) {
        currentType = type;
        document.getElementById('t-in').className = 'type-btn' + (type==='in' ? ' active plus' : '');
        document.getElementById('t-out').className = 'type-btn' + (type==='out' ? ' active minus' : '');
        const cat = document.getElementById('category');
        cat.innerHTML = categories[type].map(c => `<option value="${c[0]}">${c[0]} ${c[1]}</option>`).join('');
    }

    function addRecord() {
        const date = document.getElementById('date-input').value;
        const desc = document.getElementById('desc').value;
        const amt = parseInt(document.getElementById('amount').value);
        if(!desc || isNaN(amt)) return alert("수첩에 적을 내용을 다 입력해줘!");

        records.unshift({ id: Date.now(), date, type: currentType, cat: document.getElementById('category').value, desc, amt });
        localStorage.setItem('yuju_v3', JSON.stringify(records));
        document.getElementById('desc').value = '';
        document.getElementById('amount').value = '';
        render();
    }

    function deleteRecord(id) {
        if(confirm("이 기록을 수첩에서 지울까?")) {
            records = records.filter(r => r.id !== id);
            localStorage.setItem('yuju_v3', JSON.stringify(records));
            render();
        }
    }

    function render() {
        const list = document.getElementById('history-list');
        list.innerHTML = '';
        let balance = 0;
        records.sort((a,b) => new Date(b.date) - new Date(a.date));

        records.forEach(r => {
            balance += (r.type === 'in' ? r.amt : -r.amt);
            const item = document.createElement('div');
            item.className = `history-item ${r.type==='in'?'plus':'minus'}`;
            item.innerHTML = `
                <div>
                    <div class="item-date">${r.date}</div>
                    <div class="item-name">${r.cat} ${r.desc}</div>
                </div>
                <div style="display:flex; align-items:center">
                    <span class="item-amount">${r.type==='in'?'+':'-'}${r.amt.toLocaleString()}원</span>
                    <button class="del-btn" onclick="deleteRecord(${r.id})">✕</button>
                </div>
            `;
            list.appendChild(item);
        });
        document.getElementById('total-balance').innerText = balance.toLocaleString() + '원';
    }

    function updateStats() {
        const now = new Date();
        const day = now.getDay();
        const startOfWeek = new Date(now.getFullYear(), now.getMonth(), now.getDate() - day);
        const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
        let weekOut = 0, monthOut = 0, catCount = {};
        records.filter(r => r.type === 'out').forEach(r => {
            const rDate = new Date(r.date);
            if(rDate >= startOfWeek) weekOut += r.amt;
            if(rDate >= startOfMonth) { monthOut += r.amt; catCount[r.cat] = (catCount[r.cat] || 0) + r.amt; }
        });
        document.getElementById('week-out').innerText = weekOut.toLocaleString() + '원';
        document.getElementById('month-out').innerText = monthOut.toLocaleString() + '원';
        const top = Object.entries(catCount).sort((a,b) => b[1] - a[1])[0];
        document.getElementById('top-cat').innerText = top ? `${top[0]} (${top[1].toLocaleString()}원)` : '아직 기록이 없어요';
    }

    // 🌸 흩날리는 벚꽃잎 생성 JavaScript (입체감 업그레이드)
    function createPetals() {
        const container = document.getElementById('petal-container');
        const petalCount = 35; // 개수를 살짝 늘림

        for (let i = 0; i < petalCount; i++) {
            const petal = document.createElement('div');
            petal.className = 'petal';
            
            // 랜덤 설정
            const size = Math.random() * 10 + 6 + 'px'; // 6~16px 사이
            // 화면 밖 좌우(-15% ~ 115%)에서 생성되어 컨테이너 경계를 넘나들게 함
            const startPos = Math.random() * 130 - 15; 
            const delay = Math.random() * 15; 
            const duration = Math.random() * 12 + 8; // 8~20초 사이로 다양하게
            
            petal.style.width = size;
            petal.style.height = size;
            petal.style.left = startPos + 'vw';
            petal.style.animationDelay = delay + 's';
            petal.style.animationDuration = duration + 's';
            
            // 입체감 부여: 투명도, 핑크톤 차이, 그리고 흐림 효과(Blur) 랜덤 적용
            const opacity = Math.random() * 0.5 + 0.5; // 0.5~1.0
            const hueShift = Math.random() * 20 - 10; // 핑크색 톤을 살짝 다르게
            petal.style.opacity = opacity;
            petal.style.backgroundColor = `hsl(${355 + hueShift}, 100%, 85%)`;
            
            // 30%의 확률로 흐림 효과(멀리 있는 느낌) 적용
            if (Math.random() < 0.3) {
                petal.style.filter = 'blur(1.5px)';
            }
            
            container.appendChild(petal);
        }
    }
</script>
</body>
</html>
